name: Trigger Jenkins Minikube Deploy

on:
  push:
    branches:
      - minikube-deploy

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins branch build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${JENKINS_URL:-}" ] || [ -z "${JENKINS_USER:-}" ] || [ -z "${JENKINS_API_TOKEN:-}" ]; then
            echo "Missing Jenkins secrets. Set JENKINS_URL, JENKINS_USER and JENKINS_API_TOKEN."
            exit 1
          fi

          curl -fsS -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" \
            -X POST \
            --data-urlencode "cause=GitHub push to minikube-deploy" \
            --data-urlencode "gitBranch=${GITHUB_REF_NAME}" \
            --data-urlencode "gitCommit=${GITHUB_SHA}" \
            "${JENKINS_URL}/job/LabFull-CI-CD/buildWithParameters"
