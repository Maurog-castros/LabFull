name: Trigger Jenkins Minikube Deploy

on:
  push:
    branches:
      - minikube-deploy

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins branch build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_JOB_NAME: ${{ secrets.JENKINS_JOB_NAME }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          OPENCLAW_WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_WEBHOOK_TOKEN: ${{ secrets.OPENCLAW_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          : "${JENKINS_JOB_NAME:=LabFull-platform-smoke}"

          if [ -z "${JENKINS_URL:-}" ] || [ -z "${JENKINS_USER:-}" ] || [ -z "${JENKINS_API_TOKEN:-}" ]; then
            echo "Missing Jenkins secrets. Set JENKINS_URL, JENKINS_USER and JENKINS_API_TOKEN."
            exit 1
          fi

          if [ -z "${OPENCLAW_WEBHOOK_URL:-}" ] || [ -z "${OPENCLAW_WEBHOOK_TOKEN:-}" ]; then
            echo "Missing OpenClaw secrets. Set OPENCLAW_WEBHOOK_URL and OPENCLAW_WEBHOOK_TOKEN."
            exit 1
          fi

          curl -fsS -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" \
            -X POST \
            --data-urlencode "cause=GitHub push to minikube-deploy" \
            --data-urlencode "gitBranch=${GITHUB_REF_NAME}" \
            --data-urlencode "gitCommit=${GITHUB_SHA}" \
            --data-urlencode "OPENCLAW_WEBHOOK_URL=${OPENCLAW_WEBHOOK_URL}" \
            --data-urlencode "OPENCLAW_WEBHOOK_TOKEN=${OPENCLAW_WEBHOOK_TOKEN}" \
            "${JENKINS_URL}/job/${JENKINS_JOB_NAME}/buildWithParameters"
