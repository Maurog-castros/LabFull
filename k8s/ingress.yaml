apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: labfull-ingress
spec:
  rules:
    - host: LabFull.maurocastro.cl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
