apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Database configuration
  DB_HOST: "postgres-service"
  DB_NAME: "DBLAB"
  POSTGRES_DB: "DBLAB"
  
  # Backend configuration
  BACKEND_PORT: "8000"
  
  # Jenkins configuration
  JENKINS_BASE_URL: "https://jenkins.maurocastro.cl"
  JENKINS_JOB_PATH: "job/LabFull-platform-smoke"
  JENKINS_JOB_NAME: "LabFull-platform-smoke"
  JENKINS_TIMEOUT_SECONDS: "8"
  
  # Frontend configuration (nginx upstream)
  BACKEND_URL: "http://backend-service:8000"
